services:
  - type: web
    name: fiscal-felines
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: fastapi run app/main.py --port 8000
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: fiscal-felines-db
          property: connectionString

databases:
  - name: fiscal-felines-db
    plan: free